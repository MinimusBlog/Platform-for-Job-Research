services:
  db:
    image: postgres:15-alpine
    container_name: tramplin_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_secure_password # Тот же, что в .env
      POSTGRES_DB: tramplin_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: tramplin_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env # Убедитесь, что .env лежит в backend/
    depends_on:
      - db

volumes:
  postgres_data: